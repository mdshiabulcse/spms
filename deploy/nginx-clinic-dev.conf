# IP / hosts-file access — no domain, no SSL
# Edit server_name line with your server IP (optional; _ accepts any host)

server {
    listen 80 default_server;
    server_name _ 192.168.1.10 clinic.local;

    client_max_body_size 10M;

    location /static/ {
        alias /var/www/clinic/staticfiles/;
    }

    location / {
        include proxy_params;
        proxy_pass http://unix:/var/www/clinic/run/gunicorn.sock;
    }
}
